[pytest]
addopts = -ra --html=reports/pytest-report.html --self-contained-html
asyncio_mode = auto
testpaths = tests
pythonpath = .
markers =
    smoke: critical path tests
    regression: broader validation suite
    ui: UI automation tests
    api: API automation tests
    system: system-level validation tests
    performance: opt-in performance baseline tests
    data_variation: opt-in seeded data-variation tests
